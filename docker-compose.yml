services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cobranca
      POSTGRES_PASSWORD: cobranca
      POSTGRES_DB: cobranca
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cobranca -d cobranca"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-network

  app:
    build:
      context: ./app
    env_file:
      - ./app/.env.production
    environment:
      DATABASE_URL: postgresql://cobranca:cobranca@postgres:5432/cobranca?schema=public
      REDIS_URL: redis://redis:6379
      QUEUE_DRIVER: bullmq
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - saas-network

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    environment:
      PORT: 3001
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - saas-network

volumes:
  postgres-data:
  redis-data:

networks:
  saas-network:
    driver: bridge
